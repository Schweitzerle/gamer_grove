name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.5"

jobs:
  analyze-test:
    name: Format · Analyze · Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Codegen needs a .env for envied. Real values are not required to
      # compile/analyze/test — placeholders let the generator emit env.g.dart.
      # Runtime API calls are exercised in integration tests, not unit CI.
      - name: Create .env for codegen
        run: |
          cat > .env <<'EOF'
          SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          IGDB_CLIENT_ID=${{ secrets.IGDB_CLIENT_ID || 'placeholder-client-id' }}
          IGDB_CLIENT_SECRET=${{ secrets.IGDB_CLIENT_SECRET || 'placeholder-secret' }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          UMAMI_URL=${{ secrets.UMAMI_URL }}
          UMAMI_WEBSITE_ID=${{ secrets.UMAMI_WEBSITE_ID }}
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (envied, mocks)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test tool

      # Gate on errors + warnings (must stay at 0). The ~1400 pre-existing
      # info-level lints (deprecated_member_use, avoid_catches_without_on_clauses,
      # ...) are a Phase 1 cleanup backlog; flip to --fatal-infos once burned down.
      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: ignore

  build-android:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Create .env for codegen
        run: |
          cat > .env <<'EOF'
          SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          IGDB_CLIENT_ID=${{ secrets.IGDB_CLIENT_ID || 'placeholder-client-id' }}
          IGDB_CLIENT_SECRET=${{ secrets.IGDB_CLIENT_SECRET || 'placeholder-secret' }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          UMAMI_URL=${{ secrets.UMAMI_URL }}
          UMAMI_WEBSITE_ID=${{ secrets.UMAMI_WEBSITE_ID }}
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        run: flutter build apk --debug
